# ============================================
# 이 파일을 복사해서 application.yaml로 만드세요
# cp application-template.yaml application.yaml
# ============================================

spring:
  profiles:
    active: local

  datasource:
    url: jdbc:p6spy:mysql://localhost:3306/board?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:여기에_DB_비밀번호_입력}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET:여기에_Base64_인코딩된_시크릿키_입력}
  access-token-validity: ${JWT_ACCESS_VALIDITY:1800000}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:C:/board-uploads}
  access-url: ${FILE_ACCESS_URL:http://localhost:8080/uploads}

logging:
  level:
    org.hibernate.SQL: off
