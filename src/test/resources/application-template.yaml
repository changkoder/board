# ============================================
# 이 파일을 복사해서 application.yaml로 만드세요
# cp application-template.yaml application.yaml
# ============================================

spring:
  profiles:
    active: test

  datasource:
    url: jdbc:p6spy:h2:mem:testdb
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

file:
  upload-dir: ${java.io.tmpdir}/board-test-uploads
  access-url: http://localhost:8080/uploads

jwt:
  secret: 여기에_테스트용_Base64_인코딩된_시크릿키_입력
  access-token-validity: 1800000
  refresh-token-validity: 604800000

logging:
  level:
    org.hibernate.SQL: off
